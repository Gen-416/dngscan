name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python: ["3.11", "3.12"]
    env:
      MPLBACKEND: Agg
      MPLCONFIGDIR: /tmp/mpl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Unit tests (NumPy reference path)
        run: DNGSCAN_FAST=0 python -m unittest discover -s tests -q

      - name: Build native kernel
        run: |
          pip install pybind11 cmake
          bash tools/build_native.sh

      - name: Unit tests (strict native path)
        run: DNGSCAN_FAST=1 python -m unittest discover -s tests -q
